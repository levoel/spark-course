# Local Spark Cluster Lab
# Usage: docker compose up -d
# Spark Master UI: http://localhost:8080
# Jupyter Notebook: http://localhost:8888
# Spark Application UI (when running): http://localhost:4040

services:
  spark-master:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-master
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  spark-worker-1:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-worker-1
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_MEMORY=384m
      - SPARK_WORKER_CORES=1
      - SPARK_NO_DAEMONIZE=true
    mem_limit: 512m
    restart: unless-stopped

  spark-worker-2:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-worker-2
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_MEMORY=384m
      - SPARK_WORKER_CORES=1
      - SPARK_NO_DAEMONIZE=true
    mem_limit: 512m
    restart: unless-stopped

  jupyter:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-jupyter
    command: >
      bash -c "pip install jupyter notebook pyspark==4.0.0 &&
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token='' --NotebookApp.password=''"
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
    volumes:
      - ./data:/opt/spark/data
      - ./notebooks:/opt/spark/notebooks
    mem_limit: 1g
    depends_on:
      spark-master:
        condition: service_healthy
    restart: unless-stopped

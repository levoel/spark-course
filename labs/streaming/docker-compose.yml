# Streaming Lab (LAB-02): Kafka KRaft + Spark Structured Streaming
# Usage: docker compose up -d
# Kafka: localhost:9092
# Spark Master UI: http://localhost:8080
# Jupyter: http://localhost:8888
# Spark Application UI (when running): http://localhost:4040
# Total memory budget: ~2.0 GB (fits within 4 GB limit)

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
    ports:
      - "9092:9092"
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - streaming-net

  spark-master:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-master
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./scripts:/opt/scripts
      - ./producer:/opt/producer
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - streaming-net

  spark-worker-1:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-worker-1
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_MEMORY=384m
      - SPARK_WORKER_CORES=1
      - SPARK_NO_DAEMONIZE=true
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - streaming-net

  jupyter:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-jupyter-streaming
    command: >
      bash -c "pip install jupyter notebook pyspark==4.0.0 kafka-python-ng &&
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token='' --NotebookApp.password=''"
    ports:
      - "8888:8888"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
    volumes:
      - ./scripts:/opt/scripts
      - ./producer:/opt/producer
    mem_limit: 640m
    depends_on:
      spark-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - streaming-net

networks:
  streaming-net:
    driver: bridge

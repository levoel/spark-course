# Prometheus scrape configuration for Spark monitoring lab
# Scrapes metrics from Spark master, workers, and driver (when active)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spark-master'
    metrics_path: '/metrics/prometheus/'
    static_configs:
      - targets: ['spark-master:8080']
        labels:
          component: 'master'

  - job_name: 'spark-workers'
    metrics_path: '/metrics/prometheus/'
    static_configs:
      - targets: ['spark-worker-1:8081', 'spark-worker-2:8081']
        labels:
          component: 'worker'

  - job_name: 'spark-driver'
    metrics_path: '/metrics/prometheus/'
    scrape_timeout: 10s
    static_configs:
      - targets: ['spark-master:4040']
        labels:
          component: 'driver'

# Lakehouse Lab (LAB-03): MinIO + Spark with Delta Lake + Apache Iceberg
# Usage: docker compose up -d
# MinIO Console: http://localhost:9001 (minioadmin/minioadmin)
# MinIO API: http://localhost:9000
# Spark Master UI: http://localhost:8080
# Jupyter: http://localhost:8888
# Spark Application UI (when running): http://localhost:4040
# Total memory budget: ~2.1 GB (fits within 4 GB limit)

services:
  minio:
    image: minio/minio:RELEASE.2025-09-06T17-38-46Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - lakehouse-net

  mc-init:
    image: minio/mc:latest
    container_name: mc-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing myminio/warehouse &&
      mc mb --ignore-existing myminio/checkpoints &&
      echo 'Buckets created successfully'
      "
    mem_limit: 64m
    networks:
      - lakehouse-net

  spark-master:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-master
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./scripts:/opt/scripts
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - lakehouse-net

  spark-worker-1:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-worker-1
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_MEMORY=384m
      - SPARK_WORKER_CORES=1
      - SPARK_NO_DAEMONIZE=true
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - lakehouse-net

  jupyter:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-jupyter-lakehouse
    command: >
      bash -c "pip install jupyter notebook pyspark==4.0.0 &&
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token='' --NotebookApp.password=''"
    ports:
      - "8888:8888"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
    volumes:
      - ./scripts:/opt/scripts
    mem_limit: 768m
    depends_on:
      spark-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    driver: bridge

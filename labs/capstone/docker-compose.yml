# Capstone Lab (LAB-06): E2E Pipeline -- Spark + MinIO + Jupyter
# Usage: docker compose up -d
# MinIO Console: http://localhost:9001 (minioadmin/minioadmin)
# MinIO API: http://localhost:9000
# Spark Master UI: http://localhost:8080
# Spark Application UI: http://localhost:4040
# Jupyter: http://localhost:8888 (token: spark)
# Total memory budget: ~4 GB

services:
  minio:
    image: minio/minio:RELEASE.2025-09-06T17-38-46Z
    container_name: capstone-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - capstone-net

  mc-init:
    image: minio/mc:latest
    container_name: capstone-mc-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing myminio/warehouse &&
      mc mb --ignore-existing myminio/checkpoints &&
      mc mb --ignore-existing myminio/raw &&
      echo 'Buckets created: warehouse, checkpoints, raw'
      "
    mem_limit: 64m
    networks:
      - capstone-net

  spark-master:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: spark-master
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./scripts:/opt/scripts
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - capstone-net

  spark-worker-1:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: capstone-worker-1
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_MEMORY=512m
      - SPARK_WORKER_CORES=1
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./scripts:/opt/scripts
    mem_limit: 768m
    restart: unless-stopped
    networks:
      - capstone-net

  spark-worker-2:
    image: apache/spark:4.0.0-scala2.13-java21-python3-ubuntu
    container_name: capstone-worker-2
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_MEMORY=512m
      - SPARK_WORKER_CORES=1
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./scripts:/opt/scripts
    mem_limit: 768m
    restart: unless-stopped
    networks:
      - capstone-net

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: spark-jupyter-capstone
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=spark
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./scripts:/home/jovyan/work
    mem_limit: 1536m
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      bash -c "pip install -r /home/jovyan/work/requirements.txt &&
      start-notebook.sh --NotebookApp.token='spark'"
    restart: unless-stopped
    networks:
      - capstone-net

networks:
  capstone-net:
    driver: bridge
